name: Release

# Crée une release GitHub à partir d'un tag `v*.*.*` en buildant les bundles
# Windows (MSI + NSIS). Le bundle Windows est la cible principale de ce projet
# (courtage d'assurance Sénégal — desktop Windows).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag de release (ex: v0.1.0)"
        required: true
        type: string

jobs:
  build-windows:
    name: Build Windows (MSI + NSIS)
    runs-on: windows-2022
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      # Force cargo à utiliser link.exe du PATH (exporté par ilammy/msvc-dev-cmd)
      # au lieu de la découverte via registre Windows, qui pointe vers un
      # BuildTools fantôme (14.44.35207) absent du runner windows-2022.
      CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: link.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify link.exe is on PATH
        shell: pwsh
        run: |
          Write-Host "VCINSTALLDIR = $env:VCINSTALLDIR"
          where.exe link.exe
          where.exe cl.exe

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri et publier la release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "Horus Assurances Manager ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: |
            Voir [`CHANGELOG.md`](./CHANGELOG.md) pour la liste détaillée des changements.

            **Installation Windows :**
            - `*_x64-setup.exe` (NSIS) — recommandé pour la plupart des utilisateurs
            - `*_x64_en-US.msi` (MSI) — pour les déploiements MSI en entreprise
          releaseDraft: true
          prerelease: false
